<!DOCTYPE html>
<html>
	<head>
		<title>Counter</title>
		<script>
			var time = 10
			var timerId = null
			
			function startTimer(){
				if (timerId != null){
					return
				}
				
				var timerDisplay = document.getElementById("timer")
				timerDisplay.innerText = time + " seconds"
				
				timerId = setInterval(function () {
					updateTime(timerDisplay)
				}, 1000)
			}
			
			function updateTime(timerDisplay){
				time -= 1
				if (time > 0){
					timerDisplay.innerText = time + " seconds"
				} else {
					timerDisplay.innerText = "Time's Up!"
					clearInterval(timerId)
					timerId = null
				}
			}
			
			function resetTimer(){
				clearInterval(timerId)
				timerId = null
				time = 10
				document.getElementById("timer").innerText = time + " seconds"
			}
		</script>
		<style>
			body{
				background-color: lightgray;
			}
			#timer{
				font-size: 20px;
			}
		</style>
	</head>
	<body>
		<h1>Countdown Timer</h1>
		<div id="timer">10 seconds</div> 
		<input type="button" value="Start" onclick="startTimer()">
		<input type="button" value="Reset" onclick="resetTimer()">
	</body>
</html>
