<!DOCTYPE html>
<html>
	<head>
		<title>Sort</title>
		
		<script>
			function getInput(){
				var input = window.prompt("Enter a list of comma-seperated numbers:","Ex: 5,4,1,3,2")
				var output = document.getElementById("out")
				
				if(input == null || input == "" || input == " "){
					alert("Please enter a list of comma-seperated numbers")
					getInput()
				} else {
					console.log(input)
					input = input.split(",")
			
					for (var i = 0; i < input.length; i++){
						input[i] = parseInt(input[i])
					}
					console.log(input)
					
					var size = input.length
					var min = 0
				
					while (size >= 0){
						var i = 0
						while(i < size - 1){
							console.log(input[i],input[i+1])
							if (input[i] > input[i + 1]){
								var temp = input[i]
								input[i] = input[i + 1]
								input[i + 1] = temp
							}
							i += 1
						}
						i = i + 1
						size -= 1
					}
				}
				output.textContent = input
			}
		</script>
		
		<style>
			body{
				background-color: lightgray;
			}
		</style>
	</head>
	
	<body onload="getInput()">
		<label for="out">Sorted output:
			<textarea id="out" name="output" readonly required></textarea>
		</label>
	</body>
</html>
