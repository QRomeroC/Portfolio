<!DOCTYPE html>
<html>
	<head>
		<title>About Me</title>
		<style>
			body{
				background-color: black;
			}
			h1{
				color: white;
				font-size: 28px;
			}
			a{
				color: green;
			}
			ul{
				color: white;
			}
			p{
				font-size: 18px;
				color: white;
			}
		</style>
		<script>
			function sendReq(url){
				fetch(url)
				.then(function (res){
					return res.text()
				})
				.then(function (text){
					document.open()
					document.write(text)
					document.close()
				})
				.catch(function (err){
					console.log(err)
				})
			}
		</script>
	</head>
	<body>
		<h1>Welcome To My About Me Page!</h1>
		<p>This is the About Me page.</p>
		<ul>
			<li><a onclick="sendReq('index')">Home</a></li>
		</ul>
	</body>
</html>
