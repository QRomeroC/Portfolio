<!DOCTYPE html>
<html>
	<head>
		<title>Font Size Toggle</title>
		<script>
			function toggleFontSize(){
				var fontSize = window.localStorage.getItem("font-size")
                var arr = document.getElementsByTagName("body")
                var body = arr[0]
				if(fontSize == null || fontSize == "12px"){
					body.style["font-size"] = "24px"
					window.localStorage.setItem("font-size","24px")
				} else {
					body.style["font-size"] = "12px"
					window.localStorage.setItem("font-size","12px")
				}
            }
			
            function getFontSize(){
                var fontSize = window.localStorage.getItem("font-size")
                var arr = document.getElementsByTagName("body")
                var body = arr[0]
                if(fontSize=="12px"){
                    body.style["font-size"] = "12px"
                }
                else{
                    body.style["font-size"] = "24px"
                }
			}	
		</script>
	</head>
	
	<body onload="getFontSize()">
		<h1>Toggle Font Size</h1>
		<p> Click the link below to toggle the font size of the text:</p>
		<a href="#" onclick="toggleFontSize()" style="background-color:lightgreen;color:black;font-size:20px;padding:10px">Toggle Font Size</a>
	</body>
</html>
